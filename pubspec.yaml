name: mysimtek
description: "MySimtek Mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  intl: ^0.19.0
  google_fonts: ^8.0.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.1.3
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.8.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 # Cek versi terbaru di pub.dev

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/mysimtek.png" # Path ke file gambar kamu
  adaptive_icon_background: "#FFFFFF" # Opsional untuk Android Adaptive Icon
  adaptive_icon_foreground: "assets/logo/mysimtek.png" # Opsional

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/logo/
